name: Page diff - multi

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

env:
  # Format: NAME|URL|XPATH|FILE_PATH_RELATIVE_TO_REPO
  PAGES: |
    pharmacy-first|https://www.england.nhs.uk/publication/community-pharmacy-advanced-service-specification-nhs-pharmacy-first-service/|/html/body/main|page-diff/pharmacy-first.html
    nhse-bgts-lancets|https://www.england.nhs.uk/publication/commissioning-recommendations-blood-glucose-and-ketone-meters-testing-strips-and-lancets/|/html/body/main|page-diff/nhse-bgts-lancets.html
    low-value-medicines|https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/|/html/body/main|page-diff/low-value-medicines.html
    uk-aware|https://www.gov.uk/government/publications/uk-aware-antibiotic-classification/uk-access-watch-reserve-and-other-classification-for-antibiotics-uk-aware-antibiotic-classification|/html/body/div[2]/main|page-diff/uk-aware.html

jobs:
  check-html:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run page checks, save snapshots, and detect real changes
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p page-diff

          real_change=false
          changed_files=()
          first_snapshot_files=()

          while IFS='|' read -r NAME URL XPATH FILE_PATH; do
            [ -z "${NAME:-}" ] && continue

            echo "Checking $NAME -> $FILE_PATH"

            python page-diff/check_html.py \
              --url "$URL" \
              --xpath "$XPATH" \
              --file_path "$FILE_PATH"

            # If the file existed in HEAD, compare the updated working tree version to HEAD.
            if git cat-file -e "HEAD:$FILE_PATH" 2>/dev/null; then
              if ! git diff --quiet -- "$FILE_PATH"; then
                real_change=true
                changed_files+=("$FILE_PATH")

                echo "Change detected for $NAME"
                echo "Requesting Wayback Machine save for: $URL"
                sleep 2
                curl -sS -I "https://web.archive.org/save/${URL}" >/dev/null || true
              fi
            else
              first_snapshot_files+=("$FILE_PATH")
              changed_files+=("$FILE_PATH")

              echo "Initial snapshot detected for $NAME"
              echo "Requesting Wayback Machine save for: $URL"
              sleep 2
              curl -sS -I "https://web.archive.org/save/${URL}" >/dev/null || true
            fi
          done <<< "${PAGES}"

          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

            git add -A

            CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
            if [ -n "$CHANGED" ]; then
              git commit -m "Page-diff: update snapshots: ${CHANGED}"
              git push
            fi
          fi

          if [ "$real_change" = true ]; then
            echo "Error: Real changes detected in: ${changed_files[*]}"
            echo "Diff:"
            git --no-pager diff -- "${changed_files[@]}" || true
            exit 1
          fi

          if [ "${#first_snapshot_files[@]}" -gt 0 ]; then
            echo "Initial snapshot(s) detected for: ${first_snapshot_files[*]}. Not failing this run."
          else
            echo "No real changes detected."
          fi